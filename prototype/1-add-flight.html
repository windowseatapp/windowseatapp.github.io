<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1">
<title>Add flight</title><link rel="stylesheet" href="app.css"></head>
<body>
  <div class="status">
    <span>9:41</span>
    <span class="ico">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="#263D42"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2.5" width="3" height="9.5" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></svg>
      <svg width="17" height="12" viewBox="0 0 17 12" fill="#263D42"><path d="M8.5 2C5.6 2 3 3.1 1 4.9l1.5 1.6C4.1 5 6.2 4.2 8.5 4.2s4.4.8 6 2.3L16 4.9C14 3.1 11.4 2 8.5 2z"/><path d="M8.5 6.2c-1.6 0-3.1.6-4.2 1.6l1.6 1.6c.7-.6 1.6-1 2.6-1s1.9.4 2.6 1l1.6-1.6C11.6 6.8 10.1 6.2 8.5 6.2z"/><circle cx="8.5" cy="10.6" r="1.4"/></svg>
      <svg width="28" height="13" viewBox="0 0 28 13"><rect x="1" y="1" width="23" height="11" rx="3" fill="none" stroke="#263D42" stroke-opacity=".4"/><rect x="2.5" y="2.5" width="17" height="8" rx="1.6" fill="#263D42"/><path d="M25.8 4.6v3.8c.8-.4.8-3.4 0-3.8z" fill="#263D42" fill-opacity=".4"/></svg>
    </span>
  </div>

  <div class="screen">
    <h1 class="h1">Add your flight</h1>
    <p class="sub">We'll build your window timeline before takeoff, while you still have signal.</p>

    <div class="scan">
      <div class="viewport">
        <span class="bracket tl"></span><span class="bracket tr"></span>
        <span class="bracket bl"></span><span class="bracket br"></span>
        <div class="pass">
          <div class="row"></div><div class="row s"></div><div class="row"></div><div class="row s"></div>
        </div>
      </div>
      <p class="scan-title">Point at your boarding pass</p>
      <p class="scan-note">Paper or on-screen, hold steady to scan</p>
    </div>

    <div class="auto">
      <span class="dot">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M2 8l3.5 3.5L13 4" stroke="#6A9A00" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <span><b>Or skip the scan.</b> Window Seat finds your digital boarding pass on its own, every time you fly.</span>
    </div>

    <button class="btn btn-primary">Scan boarding pass</button>
    <button class="btn btn-ghost">Enter flight number instead</button>
  </div>

  <div class="home-ind"></div>
</body></html>
